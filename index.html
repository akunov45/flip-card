<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>React Exam Prep</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --react-blue: #61dafb;
      --redux-purple: #764abc;
      --bg-dark: #121212;
      --card-front: #1e1e1e;
      --text-gray: #b3b3b3;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: var(--bg-dark);
      color: white;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* --- Стили модалки (Login) --- */
    #authBlock {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg-dark);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }

    .modal {
      background-color: #ffffff;
      width: 90%;
      max-width: 400px;
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      color: #333;
    }

    .modal h2 {
      margin-top: 0;
      color: #1a1a1a;
    }

    .modal p {
      color: #666;
      margin-bottom: 25px;
    }

    .input-group {
      position: relative;
      margin-bottom: 20px;
    }

    .input-group input {
      width: 100%;
      padding: 15px 15px 15px 45px;
      border: 2px solid #e1e1e1;
      border-radius: 10px;
      box-sizing: border-box;
      font-size: 16px;
    }

    .input-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #aaa;
    }

    .sign-in-btn {
      width: 100%;
      padding: 15px;
      background-color: var(--react-blue);
      color: #121212;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .sign-in-btn:hover {
      background-color: #4fa8c7;
    }

    /* --- Основной контент --- */
    #mainContent {
      display: none;
      width: 100%;
      max-width: 1200px;
      padding: 40px 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      color: var(--react-blue);
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .header p {
      color: var(--text-gray);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 25px;
      width: 100%;
    }

    /* --- Карточки (как на твоем скрине) --- */
    .card {
      perspective: 1000px;
      height: 200px;
      cursor: pointer;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
    }

    .card.is-flipped .card-inner {
      transform: rotateY(180deg);
    }

    .side {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }

    .front {
      background: var(--card-front);
      border-top: 4px solid var(--react-blue);
      /* Та самая синяя полоска */
    }

    .front h3 {
      font-size: 42px;
      margin: 0;
      color: white;
    }

    .front span {
      color: var(--text-gray);
      font-size: 14px;
      margin-top: 15px;
      letter-spacing: 1px;
    }

    .back {
      background-color: white;
      color: #1a1a1a;
      transform: rotateY(180deg);
      text-align: center;
    }

    .question {
      font-size: 15px;
      font-weight: bold;
      margin-bottom: 15px;
      line-height: 1.4;
    }

    .lamp-btn {
      background: #eee;
      border: none;
      padding: 6px 15px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
    }

    .answer {
      display: none;
      font-size: 13px;
      color: #444;
      margin-top: 10px;
      background: #f0f7ff;
      padding: 8px;
      border-radius: 8px;
      border-left: 4px solid var(--redux-purple);
    }

    .answer.show {
      display: block;
    }

    .controls {
      margin-top: 50px;
      text-align: center;
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .main-btn {
      padding: 12px 25px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      background: var(--react-blue);
      color: #121212;
    }

    .loading {
      color: var(--react-blue);
      font-size: 20px;
      text-align: center;
      grid-column: 1/-1;
    }
  </style>
</head>

<body>

  <div id="authBlock">
    <div class="modal">
      <h2>React Exam</h2>
      <p>Вход для администратора</p>
      <form id="loginForm">
        <div class="input-group">
          <i class="fas fa-envelope input-icon"></i>
          <input type="email" id="email" placeholder="enter email" required>
        </div>
        <div class="input-group">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" id="password" placeholder="enter password" required>
        </div>
        <button type="submit" class="sign-in-btn">Войти</button>
      </form>
    </div>
  </div>

  <div id="mainContent">
    <div class="header">
      <h1>Экзаменационные билеты</h1>
      <p>Нажмите на карту, чтобы перевернуть. Используйте <i class="fa-solid fa-lightbulb"></i> для подсказки.</p>
    </div>

    <div class="grid" id="grid"></div>

    <div class="controls">
      <button class="main-btn" onclick="fetchTickets()">Перемешать и обновить</button>
      <button class="main-btn" style="background: #ff4d4d;" onclick="logout()">Выйти</button>
    </div>
  </div>

  <script>
    // Настройки доступа
    const ADMIN_EMAIL = "admin@gmail.com";
    const ADMIN_PASS = "admin111";

    const authBlock = document.getElementById('authBlock');
    const mainContent = document.getElementById('mainContent');
    const loginForm = document.getElementById('loginForm');

    // Логика входа
    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const pass = document.getElementById('password').value;

      if (email === ADMIN_EMAIL && pass === ADMIN_PASS) {
        localStorage.setItem('isLogged', 'true');
        showApp();
      } else {
        alert('Неверный логин или пароль!');
      }
    });

    function showApp() {
      authBlock.style.display = 'none';
      mainContent.style.display = 'block';
      fetchTickets();
    }

    function logout() {
      localStorage.removeItem('isLogged');
      location.reload();
    }

    // Проверка сессии при загрузке
    if (localStorage.getItem('isLogged') === 'true') {
      showApp();
    }

    // Загрузка билетов
    async function fetchTickets() {
      const container = document.getElementById('grid');
      container.innerHTML = '<div class="loading">Загрузка билетов...</div>';

      try {
        const res = await fetch('https://69a69d302cd1d055268e501e.mockapi.io/api/tickets/list');
        const data = await res.json();
        renderTickets(data);
      } catch (err) {
        container.innerHTML = '<div class="loading">Ошибка загрузки данных</div>';
      }
    }

    function renderTickets(tickets) {
      const container = document.getElementById('grid');
      container.innerHTML = '';

      const shuffled = [...tickets].sort(() => Math.random() - 0.5);

      shuffled.forEach((t, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.onclick = (e) => {
          if (e.target.closest('.lamp-btn')) return;
          card.classList.toggle('is-flipped');
        };

        card.innerHTML = `
          <div class="card-inner">
            <div class="side front">
              <h3>${i + 1}</h3>
              <span>REACT EXAM</span>
            </div>
            <div class="side back">
              <div class="question">${t.q}</div>
              <button class="lamp-btn" onclick="showAns(this)">
                <i class="fa-solid fa-lightbulb"></i> Подсказка
              </button>
              <div class="answer">${t.a}</div>
            </div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    function showAns(btn) {
      const ans = btn.nextElementSibling;
      ans.classList.toggle('show');
      btn.innerHTML = ans.classList.contains('show')
        ? '<i class="fa-solid fa-xmark"></i> Скрыть'
        : '<i class="fa-solid fa-lightbulb"></i> Подсказка';
    }
  </script>
</body>

</html>
